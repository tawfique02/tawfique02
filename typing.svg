<svg xmlns="http://www.w3.org/2000/svg" width="700" height="70" viewBox="0 0 700 70">
  <defs>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7aa2f7;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#bb9af7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7dcfff;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background gradient -->
  <rect width="700" height="70" fill="#0a0e14" opacity="0.3"/>
  
  <!-- Decorative line top -->
  <line x1="50" y1="10" x2="650" y2="10" stroke="url(#textGrad)" stroke-width="1" opacity="0.5"/>
  
  <style>
    .phrase {
      font-family: 'JetBrains Mono', 'Courier New', monospace;
      font-size: 20px;
      font-weight: 700;
      opacity: 0;
      animation: fadeIn 15s infinite;
      filter: url(#glow);
      letter-spacing: 0.5px;
    }
    
    .p1 { fill: url(#textGrad); animation-delay: 0s; }
    .p2 { fill: url(#textGrad); animation-delay: 5s; }
    .p3 { fill: url(#textGrad); animation-delay: 10s; }
    
    @keyframes fadeIn {
      0%   { opacity: 0; }
      3%   { opacity: 1; }
      32%  { opacity: 1; }
      36%  { opacity: 0; }
      100% { opacity: 0; }
    }
  </style>
  
  <!-- Phrase 1 -->
  <text class="phrase p1" x="350" y="45" text-anchor="middle">
    👋 Hi! I'm Md Tawfique Elahey!
  </text>
  
  <!-- Phrase 2 -->
  <text class="phrase p2" x="350" y="45" text-anchor="middle">
    🚀 Open-Source Enthusiast
  </text>
  
  <!-- Phrase 3 -->
  <text class="phrase p3" x="350" y="45" text-anchor="middle">
    💡 Learning In Public · Empowering Others
  </text>
  
  <!-- Decorative line bottom -->
  <line x1="50" y1="60" x2="650" y2="60" stroke="url(#textGrad)" stroke-width="1" opacity="0.5"/>
</svg>
